name: 주가 데이터 업데이트

on:
  schedule:
    # 한국시간 기준: 10:00, 12:00, 15:00, 18:00, 21:00, 00:00
    # GitHub Actions는 UTC 기준 → KST = UTC+9
    - cron: '0 1 * * *'   # KST 10:00
    - cron: '0 3 * * *'   # KST 12:00
    - cron: '0 6 * * *'   # KST 15:00
    - cron: '0 9 * * *'   # KST 18:00
    - cron: '0 12 * * *'  # KST 21:00
    - cron: '0 15 * * *'  # KST 00:00 (다음날)
  workflow_dispatch:       # 수동 실행 버튼도 활성화

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          pip install yfinance pandas requests supabase

      - name: 주가 데이터 업데이트 실행
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python scripts/update_stocks.py
