name: 주가 데이터 업데이트
 
on:
  schedule:
    - cron: '0 19 * * *'  # KST 04:00 (오전 4시)
    - cron: '0 1 * * *'   # KST 10:00 (오전 10시)
    - cron: '0 7 * * *'   # KST 16:00 (오후 4시)
  workflow_dispatch:
 
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install yfinance pandas requests supabase lxml
      - name: 주가 데이터 업데이트 실행
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python update_stocks.py
